[project]
name = "blackjax-benchmarks"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "blackjax",
    "numpyro",
    "exojax",
    "numpy",
    "matplotlib",
    "scipy",
    "optax",
    "arviz",
    "ipython",
    "pytest",
]

[project.optional-dependencies]
cpu = ["jax[cpu]", "jaxlib"]
gpu = ["jax[cuda12]", "jaxlib"]

